<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  /* brand */
  --accent:#0E8A6B; --accent-700:#0A6B53; --accent-800:#085441;
  --accent-100:#DCEFE8; --accent-050:#EEF7F3; --accent-200:#BFE2D6;
  /* warm neutrals */
  --ink:#15211C; --text:#3A463F; --muted:#6E7A73; --faint:#9AA39D;
  --line:#E7E4DC; --line-soft:#F0EDE6;
  --bg:#F6F4EE; --card:#FFFFFF;
  /* semantic */
  --amber:#C0801C; --amber-bg:#FBF1DD; --amber-ink:#7A5310;
  --danger:#C5453B; --danger-bg:#FAE6E4; --danger-ink:#8E2A22;
  --info:#2F6DB3; --info-bg:#E5EEF8;
  --blue:#2F6DB3;
  /* radii + shadow */
  --r-sm:10px; --r:14px; --r-md:16px; --r-lg:20px; --r-xl:28px;
  --sh-sm:0 1px 2px rgba(21,33,28,.06), 0 1px 3px rgba(21,33,28,.05);
  --sh:0 2px 8px rgba(21,33,28,.06), 0 8px 24px rgba(21,33,28,.05);
  --sh-lg:0 12px 32px rgba(21,33,28,.10), 0 4px 10px rgba(21,33,28,.05);
  --font-display:'Poppins', system-ui, sans-serif;
  --font:'Plus Jakarta Sans', system-ui, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font); color:var(--text); background:#26302B;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
#root{min-height:100vh;}
h1,h2,h3,h4{font-family:var(--font-display); color:var(--ink); margin:0; letter-spacing:-.01em;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,textarea,select{font-family:inherit;}
::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-thumb{background:rgba(21,33,28,.16); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit;}

/* hide scrollbar inside phone */
.no-sb::-webkit-scrollbar{width:0; height:0;}
.no-sb{scrollbar-width:none;}

@keyframes fadeUp{from{transform:translateY(10px);} to{transform:translateY(0);}}
@keyframes popIn{from{transform:translateY(6px) scale(.985);} to{transform:translateY(0) scale(1);}}
@keyframes fadeIn{from{opacity:.001;} to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
@keyframes dot{0%,60%,100%{opacity:.3; transform:translateY(0);} 30%{opacity:1; transform:translateY(-3px);}}
@keyframes spin{to{transform:rotate(360deg);}}
.fade-up{animation:fadeUp .4s cubic-bezier(.2,.7,.3,1) both;}
.pop-in{animation:popIn .32s cubic-bezier(.2,.8,.3,1) both;}
</style>
</head>
